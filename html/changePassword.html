<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Keys</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/buttons-style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="container">
      <main>
        <div id="imagens">
          <img
            src="../images/RobCollectionOps.png"
            alt="Imagem de robô com engrenagens em seu rosto"
            id="logoRobo"
          />
        </div>
        <div id="divForm">
          <h3 class="balaoConversa">
            🤖 Entrando em modo de reconfiguração... Bip Bop... Copie o código
            de verificação enviado para o email cadastrado, e crie uma nova
            senha.
          </h3>
          <form id="cadastroUsuario">
            <label for="codigo">🔑 Código de verificação: </label>
            <input type="text" id="codigo" name="codigo" required />
            <label for="novaSenha">🔒 Nova senha: </label>
            <input type="password" id="novaSenha" name="novaSenha" required />
            <label for="confirmarNovaSenha">✅ Confirmar nova senha: </label>
            <input
              type="password"
              id="confirmarNovaSenha"
              name="confirmarNovaSenha"
              required
            />
            <div class="button-group">
              <button type="submit" class="btn-register">
                🔄 Alterar senha
              </button>
              <a href="./login.html" class="btn-action btn-back"
                >↩️ Voltar ao Login</a
              >
            </div>
          </form>
        </div>
      </main>
    </div>
    <div id="containerDireita">
      <a href="../index.html">
        <img alt="rubikeys logo" src="../images/rubikeys.png" id="rubikeys" />
      </a>
    </div>
    <script src="../js/validation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
