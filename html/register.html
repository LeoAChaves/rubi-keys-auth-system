<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro Keys RUBI</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/buttons-style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../images/rubikeys.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="containerDireita">
      <a href="../index.html">
        <img alt="rubikeys logo" src="../images/rubikeys.png" id="rubikeys" />
      </a>
    </div>
    <main>
      <div id="imagens">
        <img
          src="../images/RobCollectionHi.png"
          alt="Imagem de robô dizendo olá"
          id="logoRobo"
        />
      </div>
      <div id="divForm">
        <h3 class="balaoConversa" id="messageBalloon">
          Olá, seja bem-vindo a RUBI. Caso ainda não seja membro, cadastre-se
          aqui. Se já tiver cadastro, clique em
          <a href="./login.html">login</a>.
        </h3>
        <form
          action="../php/process_register.php"
          method="POST"
          id="cadastroUsuario"
        >
          <div class="inputs">
            <label for="username">👤 Nome: </label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="inputs">
            <label for="email">📧 Email: </label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="inputs">
            <label for="senha">🔒 Senha: </label>
            <input type="password" id="senha" name="senha" required />
          </div>
          <div class="inputs">
            <label for="confirmarSenha">✅ Confirmar senha: </label>
            <input
              type="password"
              id="confirmarSenha"
              name="confirmarSenha"
              required
            />
          </div>
          <p>Já sou usuário. <a href="./login.html">Login</a></p>
          <button
            type="submit"
            name="register"
            id="submit"
            value="Signup"
            class="btn-register"
          >
            📝 Cadastrar
          </button>
        </form>
        <p id="creditos">Powered by RubiKeys</p>
      </div>
    </main>
    <script src="../js/validation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
