<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Keys RUBI</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/buttons-style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=K2D:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="container">
      <main>
        <div id="imagens">
          <img
            src="../images/RobCollectionHello.png"
            alt="Imagem de robô sorrindo e dizendo olá"
            id="logoRobo"
          />
        </div>
        <div id="divForm">
          <h3 class="balaoConversa">
            Olá, que bom te ver aqui. Se já possui cadastro, faça o login aqui.
            Se ainda não for membro, clique em
            <a href="./register.html">cadastro</a>.
          </h3>
          <form
            id="cadastroUsuario"
            action="../php/process_login.php"
            method="POST"
          >
            <label for="email">📧 Email: </label>
            <input type="email" id="email" name="email" required />
            <label for="senha">🔒 Senha: </label>
            <input type="password" id="senha" name="senha" required />
            <div class="button-group">
              <a href="./forgotPassword.html" class="btn-action btn-forgot"
                >❓ Esqueci a senha</a
              >
              <a href="./register.html" class="btn-action btn-register"
                >📝 Registrar-se</a
              >
            </div>
            <button type="submit" class="btn-primary">🔐 Login</button>
          </form>
          <p id="creditos">Powered by Keys</p>
        </div>
      </main>
    </div>
    <div id="containerDireita">
      <a href="../index.html">
        <img alt="rubikeys logo" src="../images/rubikeys.png" id="rubikeys" />
      </a>
    </div>
    <script src="../js/validation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
